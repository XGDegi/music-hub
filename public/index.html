<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Hub Dashboard</title>
<style>
  body { font-family: Arial, sans-serif; background: #1e1e1e; color: #fff; text-align: center; padding: 20px; }
  h1 { color: #ff4081; }
  #progress-bar { width: 80%; background: #333; border-radius: 10px; margin: 20px auto; height: 25px; overflow: hidden; }
  #progress-fill { height: 100%; width: 0%; background: #ff4081; text-align: center; line-height: 25px; color: #fff; transition: width 0.5s; }
  .download-item { margin: 10px 0; }
</style>
</head>
<body>

<h1>Music Hub Dashboard</h1>

<div id="current-download">
  <h2>Current Download</h2>
  <div id="progress-text">No downloads yet</div>
  <div id="progress-bar"><div id="progress-fill">0%</div></div>
</div>

<div id="queue">
  <h2>Queue</h2>
  <ul id="queue-list"></ul>
</div>

<div id="zips">
  <h2>Available ZIPs</h2>
  <ul id="zip-list"></ul>
</div>

<script>
async function updateStatus() {
  try {
    const res = await fetch('/status');
    const data = await res.json();

    // Update current download progress
    if(data.current) {
      document.getElementById('progress-text').innerText = `Downloading: ${data.current.progress}`;
      
      // Calculate percentage for progress bar
      const [done, total] = data.current.progress.split(' / ').map(Number);
      const percent = total ? Math.floor((done / total) * 100) : 0;
      document.getElementById('progress-fill').style.width = percent + '%';
      document.getElementById('progress-fill').innerText = percent + '%';
    } else {
      document.getElementById('progress-text').innerText = 'No downloads yet';
      document.getElementById('progress-fill').style.width = '0%';
      document.getElementById('progress-fill').innerText = '0%';
    }

    // Update queue
    const queueList = document.getElementById('queue-list');
    queueList.innerHTML = '';
    data.queue.forEach(item => {
      const li = document.createElement('li');
      li.innerText = `${item.status} - ${item.progress || ''}`;
      queueList.appendChild(li);
    });

    // Update ZIP list
    const zipList = document.getElementById('zip-list');
    zipList.innerHTML = '';
    data.zips.forEach(item => {
      const li = document.createElement('li');
      li.innerHTML = `<a href="/zips/${item.zip}" target="_blank">${item.zip}</a>`;
      zipList.appendChild(li);
    });

  } catch(err) {
    console.error(err);
  }

  setTimeout(updateStatus, 1000); // update every 1 second
}

updateStatus();
</script>

</body>
</html>
